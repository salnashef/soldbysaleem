    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .result { margin-top: 16px; font-size: 13px; background-color: #fff; padding: 15px; border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); line-height: 1.7; overflow-x: auto; }
    .unit-rate { color: #888; font-size: 11px; font-weight: normal; margin-left: 4px; }
    .discount-line { color: #c0392b; font-weight: bold; }
    .asp-highlight { color: #534AB7; font-weight: bold; font-size: 1.1em; }
    .field-hint { font-weight: normal; color: #999; font-size: 11px; }
    .prog-note { background:#eef7ff; border-left:3px solid #0077cc; padding:8px 10px; font-size:11.5px;

/* Maps an onshore programme to the published (regular) schedule used as the

const ONSHORE_REGULAR_EQUIVALENT = {
  "Morning 18/20 General":    "Morning 20",
  "Afternoon 18/20 Academic": "Afternoon 20"
};

function fmtPct(p) { return (Math.round(p * 10) / 10).toString(); }

function regularWeeklyRate(country, prog, duration) {
  const key = ONSHORE_REGULAR_EQUIVALENT[prog] || prog;
  const sch = priceSchedulesOffshore[country] && priceSchedulesOffshore[country][key];
  let r = 0;
  if (sch) for (let w in sch) { if (duration >= parseInt(w)) r = sch[w]; }
  return r;
}

function onshoreWeeklyRate(country, prog, duration) {
  if (country === "Canada") return onshoreRatesCanada[prog] || 0;
  return prog.indexOf("Morning") !== -1 ? (duration >= 4 ? 170 : 190) : (duration >= 4 ? 140 : 160);
}

function updateProgramTypeDropdown() {
  const country = document.getElementById("country").value;
  const campus  = document.getElementById("campus").value;
  const cat     = document.getElementById("student-category").value;
  const dr      = document.getElementById("program-type");
  const prev    = dr.value;
  dr.innerHTML  = "";
  if (!country) return;

  if (isCareerCollege()) {
    const list = careerCollegePrograms[campus] || [];
    let group = null, lastStream = null;
    list.forEach(function(p) {
      if (p.stream !== lastStream) {
        group = document.createElement("optgroup"); group.label = p.stream;
        dr.appendChild(group); lastStream = p.stream;
      }
      const o = document.createElement("option"); o.value = p.value; o.textContent = p.label;
      group.appendChild(o);
    });
    if (prev && ccIndex[prev] && list.indexOf(ccIndex[prev]) !== -1) dr.value = prev;
    syncCareerCollegeDuration();
    showProgramNote();
    updateHomestayAndTransfer();
    return;
  }

  let opts = [];
  if (cat === "onshore" && country === "USA") {
    opts = [
      { value:"Morning 18/20 General",   label:"Morning 18/20 (General)" },
      { value:"Afternoon 18/20 Academic", label:"Afternoon 18/20 (Academic)" }
    ];
  } else {
    Object.keys(priceSchedulesOffshore[country]).forEach(function(p) {
      if (cat === "onshore" && country === "Canada" && !onshoreRatesCanada[p]) return;
      opts.push({ value:p, label:p });
    });
    if (cat === "offshore") {
      Object.keys(specialPrograms).forEach(function(p) {
        const sp = specialPrograms[p];
        if (sp.country !== country) return;
        if (campus && sp.campuses.indexOf(campus) === -1) return;
        opts.push({ value:p, label:(programLabels[p] || p) });
      });
    }
  }

  opts.forEach(function(p) {
    const o = document.createElement("option"); o.value = p.value; o.textContent = p.label; dr.appendChild(o);
  });
  if (prev && opts.some(function(o){ return o.value === prev; })) dr.value = prev;

  showProgramNote();
  updateHomestayAndTransfer();
}

  accomList().forEach(function(a) {

/* =========================================================================
   PRICING HELPERS
   ========================================================================= */
function isHighSeasonMonth(country, m) {
  if (country === "Canada") return m >= 6 && m <= 8;              // Jun 1 - Aug 31
  return (m >= 4 && m <= 8) || m === 11 || m === 12;              // Apr 1 - Aug 31, Nov 1 - Dec 31
}

function programPricing(prog, country, campus, cat, duration) {
  const cc = isCareerCollege() ? ccIndex[prog] : null;
  if (cc) {
    return { rate:cc.tuition / cc.weeks, tuition:cc.tuition,
             rateNote:"Programme fee, " + cc.weeks + " weeks" +
                      (duration !== cc.weeks ? " (entered " + duration + " wks)" : ""),
             materialsOverride:0, materialsNote:"Included in programme fee",
             skipRegistration:true, careerCollege:true, ccWeeks:cc.weeks };
  }

  const sp = specialPrograms[prog];

  if (sp && cat === "offshore") {
    if (sp.mode === "weekly") {
      return { rate:sp.rate, tuition:sp.rate * duration, rateNote:money(sp.rate) + "/wk x " + duration + " wks",
               materialsOverride: sp.materialsFlat !== undefined ? sp.materialsFlat : null,
               materialsNote: sp.materialsFlat !== undefined ? "Flat fee" : null,
               skipRegistration:false, noTransfer:!!sp.noTransfer };
    }
    if (sp.mode === "package") {
      const keys = Object.keys(sp.prices).map(Number).sort(function(a,b){ return a - b; });
      let chosen = keys[0];
      keys.forEach(function(k){ if (duration >= k) chosen = k; });
      const price = sp.prices[chosen];
      return { rate:price / chosen, tuition:price,
               rateNote:chosen + "-week package price" + (duration !== chosen ? " (entered " + duration + " wks)" : ""),
               materialsOverride: sp.allInclusive ? 0 : null,
               materialsNote: sp.allInclusive ? "Included in package" : null,
               skipRegistration: !!sp.allInclusive, packageWeeks:chosen };
    }
    if (sp.mode === "block") {
      const blocks = Math.ceil(duration / sp.blockWeeks);
      return { rate:sp.blockPrice / sp.blockWeeks, tuition:blocks * sp.blockPrice,
               rateNote:money(sp.blockPrice) + " x " + blocks + " block" + (blocks > 1 ? "s" : "") + " of " + sp.blockWeeks + " wks",
               materialsOverride: blocks * sp.blockMaterials,
               materialsNote: money(sp.blockMaterials) + " per level x " + blocks,
               skipRegistration:false };
    }
  }

  if (cat === "onshore") {
    const charged = onshoreWeeklyRate(country, prog, duration);
    let regular   = regularWeeklyRate(country, prog, duration);
    if (!regular || regular < charged) regular = charged;
    return { rate:regular, chargedRate:charged, tuition:regular * duration,
             rateNote:money(regular) + "/wk x " + duration + " wks",
             materialsOverride:null, materialsNote:null, skipRegistration:false, onshore:true };
  }

  let rate = 0;
  const sch = priceSchedulesOffshore[country] && priceSchedulesOffshore[country][prog];
  if (sch) for (let w in sch) { if (duration >= parseInt(w)) rate = sch[w]; }
  return { rate:rate, chargedRate:rate, tuition:rate * duration,
           rateNote:money(rate) + "/wk x " + duration + " wks",
           materialsOverride:null, materialsNote:null, skipRegistration:false };
}

function calculateMaterialFee(country, campus, duration) {
  const perBlock = (country === "USA") ? materialsPerBlock.USA : materialsPerBlock.Canada;
  let total = Math.ceil(duration / 12) * perBlock;
  const halfPrice = duration <= 8;
  if (halfPrice) total = total * 0.5;
  return { total:total, halfPrice:halfPrice, perBlock:perBlock };
}

/* =========================================================================
   CORE CALCULATION
   ========================================================================= */
function calculateGeneric(prog) {
  const cat        = document.getElementById("student-category").value;
  const country    = document.getElementById("country").value;
  const campus     = document.getElementById("campus").value;
  const ccProg     = isCareerCollege() ? ccIndex[prog] : null;
  const duration   = ccProg ? ccProg.weeks : (parseInt(document.getElementById("duration").value) || 0);
  const startDate  = new Date(document.getElementById("start-date").value + "T00:00:00");
  const accom      = currentAccom();
  const accomWeeks = parseInt(document.getElementById("homestay-duration").value) || 0;
  const transferType = document.getElementById("transfer-type").value;
  const discountInput = parseFloat(document.getElementById("discount").value) || 0;
  const optOutIns    = document.getElementById("opt-out-insurance").checked;
  const studentType  = document.getElementById("student-type").value;

  const extraNights  = parseInt(document.getElementById("extra-nights").value) || 0;
  const electiveRate = parseFloat(document.getElementById("elective-addon").value) || 0;
  const lessonsFee   = parseFloat(document.getElementById("lesson-package").value) || 0;
  const ieltsExamFee = parseFloat(document.getElementById("ielts-exam").value) || 0;
  const changeCount  = parseInt(document.getElementById("change-count").value) || 0;
  const custodianFee = parseFloat(document.getElementById("custodianship").value) || 0;
  const specialDiet  = document.getElementById("special-diet").checked;
  const i20          = document.getElementById("i20-fee").checked;

  /* tuition */
  const pp = programPricing(prog, country, campus, cat, duration);
  const tuitionBeforeDiscount = pp.tuition;

  let discount, discountAmount, discountLabel, discountShort;
  if (ccProg) {
    discountAmount = Math.max(0, Math.min(discountInput, tuitionBeforeDiscount));
    discount = tuitionBeforeDiscount > 0 ? (discountAmount / tuitionBeforeDiscount) * 100 : 0;
    discountLabel = "Scholarship";
    discountShort = "Scholarship";
  } else if (pp.onshore) {
    discountAmount = (pp.rate - pp.chargedRate) * duration;
    discount = tuitionBeforeDiscount > 0 ? (discountAmount / tuitionBeforeDiscount) * 100 : 0;
    discountLabel = "Onshore rate discount (" + fmtPct(discount) + "%)";
    discountShort = "Onshore discount";
  } else {
    discount = discountInput;
    discountAmount = tuitionBeforeDiscount * (discount / 100);
    discountLabel = "Tuition discount (" + discount + "%)";
    discountShort = "Discount";
  }
  const tuitionFinal = tuitionBeforeDiscount - discountAmount;
  const netRate      = duration > 0 ? tuitionFinal / duration : 0;

  /* accommodation */
  const billedUnits = accom.none ? 0
    : (accom.unit === "month" ? Math.ceil(accomWeeks / 4) : accomWeeks);
  const accomBase   = accom.rate * billedUnits;
  const pFee        = accom.none ? 0 : homestayPlacementFees[country];
  const extraNightFee = (accom.none || !accom.extraNight) ? 0 : accom.extraNight * extraNights;

  let hsUnits = 0;
  if (!accom.none && accom.hsSurcharge && billedUnits > 0 && !isNaN(startDate.getTime())) {
    for (let i = 0; i < billedUnits; i++) {
      const curr = new Date(startDate);
      if (accom.unit === "month") curr.setMonth(startDate.getMonth() + i);
      else curr.setDate(startDate.getDate() + i * 7);
      if (isHighSeasonMonth(country, curr.getMonth() + 1)) hsUnits++;
    }
  }
  const hsRate  = accom.hsSurcharge || 0;
  const hsTotal = hsUnits * hsRate;

  const dietFee = (specialDiet && !accom.none) ? specialDietWeekly * accomWeeks : 0;
  const supplementFee = (country === "Canada" && studentType === "Minor" && !accom.none)
    ? MINOR_SUPPLEMENT_WEEKLY_RATE * accomWeeks : 0;

  /* other fees */
  const regFee = pp.skipRegistration ? 0 : registrationFees[country];
  const mat    = calculateMaterialFee(country, campus, duration);
  const matTotal = pp.materialsOverride !== null && pp.materialsOverride !== undefined
    ? pp.materialsOverride : mat.total;
  const matNote  = pp.materialsNote || (money(matTotal / (duration || 1)) + "/wk"
    + (mat.halfPrice ? " (50% short-duration discount, 8 wks or less)" : ""));

  const transferFee = pp.noTransfer ? 0 : (airportTransferPrices[country][campus][transferType] || 0);
  const insFee   = optOutIns ? 0 : duration * 7 * insuranceRates[country];
  const electiveFee = electiveRate * duration;
  const changeFee   = changeCount * changeFees[country];
  const i20Fee      = (country === "USA" && i20) ? I20_FEE : 0;
  const custodian   = country === "Canada" ? custodianFee : 0;

  const total = tuitionFinal + regFee + matTotal + accomBase + extraNightFee + pFee + hsTotal
    + dietFee + supplementFee + insFee + transferFee + electiveFee + lessonsFee
    + custodian + i20Fee + changeFee + ieltsExamFee;

  return {
    prog:prog, progLabel: (ccIndex[prog] ? ccIndex[prog].label : (programLabels[prog] || prog)),
    school: isCareerCollege() ? "Career Colleges" : "English Language Schools",
    cat:cat, country:country, campus:campus,
    duration:duration, rate:pp.rate, chargedRate:pp.chargedRate, netRate:netRate,
    rateNote:pp.rateNote, packageWeeks:pp.packageWeeks, onshore:!!pp.onshore,
    tuitionBeforeDiscount:tuitionBeforeDiscount, discount:discount, discountAmount:discountAmount,
    discountLabel:discountLabel, discountShort:discountShort,
    tuitionFinal:tuitionFinal,
    regFee:regFee, matTotal:matTotal, matNote:matNote,
    accomName:accom.name, accomRate:accom.rate, accomUnit:accom.unit, accomWeeks:accomWeeks,
    billedUnits:billedUnits, accomBase:accomBase, extraNights:extraNights, extraNightFee:extraNightFee,
    pFee:pFee, hsUnits:hsUnits, hsRate:hsRate, hsTotal:hsTotal,
    dietFee:dietFee, studentType:studentType, supplementFee:supplementFee,
    insFee:insFee, transferType:transferType, transferFee:transferFee, optOutIns:optOutIns,
    electiveRate:electiveRate, electiveFee:electiveFee, lessonsFee:lessonsFee,
    custodianFee:custodian, i20Fee:i20Fee, changeCount:changeCount, changeFee:changeFee,
    ieltsExamFee:ieltsExamFee,
    total:total
  };
}

/* Shared quote header lines, used by screen, PDF, copy HTML and copy text */
function quoteHeaderRows(d, extra) {
  const hsDur = d.accomWeeks;
  const rows = [
    ["Category",          d.cat.toUpperCase()],
    ["School",            d.school]
  ];
  if (extra && extra.programsCompared) rows.push(["Programmes compared", extra.programsCompared]);
  else rows.push(["Programme", d.progLabel]);
  rows.push(
    ["Campus",            d.campus + ", " + d.country],
    ["Duration",          d.duration + " weeks"],
    ["Accommodation",     d.accomName + (hsDur > 0 ? " (" + hsDur + " wks)" : "")],
    ["Airport transfer",  d.transferType],
    ["Medical insurance", d.optOutIns ? "Opted out" : "Included"],
    ["Student type",      d.studentType + (d.supplementFee > 0 ? " (minor supplement applies)" : "")],
    ["Start date",        document.getElementById("start-date").value]
  );
  return rows;
}

/* Shared fee row builder used by the on-screen quote, PDF, and copy output */
function buildFeeRows(d) {
  const rows = [];
  function add(label, value, note, negative) {
    rows.push({ label:label, value:value, note:note || "", negative:!!negative });
  }
  const isSchol = d.discountShort === "Scholarship";
  const word    = isSchol ? "scholarship" : "discount";
  add("Tuition (" + (d.onshore ? "regular rate" : "before " + word) + ")",
      d.tuitionBeforeDiscount, d.rateNote);
  if (d.discountAmount > 0) {
    add(d.discountLabel, d.discountAmount,
        isSchol ? "Flat award, " + fmtPct(d.discount) + "% of tuition"
                : fmtPct(d.discount) + "% off regular tuition", true);
    add("Tuition (after " + word + ")", d.tuitionFinal,
        money(d.netRate) + "/wk" + (d.onshore ? " onshore rate" : ""));
  }
  if (d.regFee > 0) add("Registration / enrolment", d.regFee, "Flat");
  add("Course materials", d.matTotal, d.matNote);
  if (d.accomBase > 0) {
    add("Accommodation - " + d.accomName, d.accomBase,
        money(d.accomRate) + "/" + d.accomUnit + " x " + d.billedUnits + " " + d.accomUnit + (d.billedUnits === 1 ? "" : "s"));
  }
  if (d.extraNightFee > 0) add("Extra nights", d.extraNightFee, money(d.extraNightFee / d.extraNights) + "/night x " + d.extraNights);
  if (d.pFee > 0) add("Accommodation placement", d.pFee, "Flat, non-refundable");
  if (d.hsTotal > 0) add("High season surcharge", d.hsTotal, money(d.hsRate) + " x " + d.hsUnits + " " + d.accomUnit + (d.hsUnits === 1 ? "" : "s"));
  if (d.dietFee > 0) add("Special diet supplement", d.dietFee, money(specialDietWeekly) + "/wk x " + d.accomWeeks + " wks");
  if (d.supplementFee > 0) add("Minor homestay supplement", d.supplementFee, money(MINOR_SUPPLEMENT_WEEKLY_RATE) + "/wk x " + d.accomWeeks + " wks");
  add("Medical insurance", d.insFee, d.optOutIns ? "Opted out" : money(insuranceRates[d.country]) + "/day x " + (d.duration * 7) + " days");
  if (d.transferFee > 0) add("Airport transfer", d.transferFee, d.transferType);
  if (d.electiveFee > 0) add("Specialised elective add-on", d.electiveFee, money(d.electiveRate) + "/wk x " + d.duration + " wks");
  if (d.lessonsFee > 0) add("Private / semi-private lessons", d.lessonsFee, "Package");
  if (d.custodianFee > 0) add("Custodianship", d.custodianFee, "Flat");
  if (d.i20Fee > 0) add("I-20 processing / re-issue", d.i20Fee, "Flat");
  if (d.changeFee > 0) add("Course / accommodation changes", d.changeFee, money(changeFees[d.country]) + " x " + d.changeCount);
  if (d.ieltsExamFee > 0) add("IELTS exam", d.ieltsExamFee, "Fees and taxes vary by test centre");
  return rows;
}

/* =========================================================================
   SINGLE QUOTE
   ========================================================================= */
function calculateQuote() {
  const prog = document.getElementById("program-type").value;
  const d    = calculateGeneric(prog);

  lastTuitionAfterDiscount = d.tuitionFinal;
  lastTotal    = d.total;
  lastDuration = d.duration || 1;
  lastMode     = 'single';
  lastCalcData = d;
  lastCompNet  = null;

  let body = "";
  buildFeeRows(d).forEach(function(r) {
    const val = r.negative
      ? '<span class="discount-line">-' + money(r.value) + '</span>'
      : money(r.value);
    body += r.label + ": " + val
      + (r.note ? ' <span class="unit-rate">(' + r.note + ')</span>' : '') + '<br>';
  });

  let head = "";
  quoteHeaderRows(d).forEach(function(r) {
    head += r[0] + ": " + r[1] + "<br>";
  });

  document.getElementById("total-price").innerHTML =
    '<div style="border-bottom:1px solid #ddd;padding-bottom:10px;margin-bottom:10px;">' + head + '</div>' +
    body +
    '<br><strong style="font-size:1.3em;color:#0077cc;">TOTAL: ' + money(d.total) + '</strong>';

  document.getElementById("total-price").style.display = "block";
  document.getElementById("action-buttons").style.display = "block";
  document.getElementById("agent-section").style.display = "block";
  document.getElementById("agent-result").style.display = "none";
}

  { label:"Minor supplement",          key:"supplementFee" },
  { label:"Insurance",                 key:"insFee" },
  { label:"Transfer",                  key:"transferFee" },
  { label:"Elective add-on",           key:"electiveFee" },
  { label:"Private lessons",           key:"lessonsFee" },
  { label:"Custodianship",             key:"custodianFee" },
  { label:"I-20 processing",           key:"i20Fee" },
  { label:"Change fees",               key:"changeFee" },
  { label:"IELTS exam",                key:"ieltsExamFee" }
];

function compCell(row, val) {
  if (row.plain) return String(val);
  return (row.negative && val > 0 ? "-" : "") + money(val);
}

function activeComparisonRows(results) {
  const always = ["duration","tuitionBeforeDiscount","tuitionFinal","regFee","matTotal","insFee"];
  const kind = results.length ? results[0].data.discountShort : "Discount";
  const scholarship = kind === "Scholarship";
  const onshore     = kind === "Onshore discount";
  return comparisonRows.filter(function(row) {
    if (always.indexOf(row.key) !== -1) return true;
    return results.some(function(r){ return r.data[row.key] > 0; });
  }).map(function(row) {
    if (scholarship) {
      if (row.key === "discountAmount")        return Object.assign({}, row, { label:"Scholarship" });
      if (row.key === "tuitionBeforeDiscount") return Object.assign({}, row, { label:"Tuition (before schol.)" });
      if (row.key === "tuitionFinal")          return Object.assign({}, row, { label:"Tuition (after schol.)" });
    } else if (onshore) {
      if (row.key === "discountAmount")        return Object.assign({}, row, { label:"Onshore discount" });
      if (row.key === "tuitionBeforeDiscount") return Object.assign({}, row, { label:"Tuition (regular rate)" });
      if (row.key === "tuitionFinal")          return Object.assign({}, row, { label:"Tuition (onshore rate)" });
    }
    return row;
  });
}

function comparisonProgramList() {
  const country = document.getElementById("country").value;
  const cat     = document.getElementById("student-category").value;

  if (isCareerCollege()) {
    const campus = document.getElementById("campus").value;
    const list   = (careerCollegePrograms[campus] || []).slice(0, 3);
    return list.map(function(p){ return p.value; });
  }
  if (cat === "onshore" && country === "USA") return ["Morning 18/20 General","Afternoon 18/20 Academic"];
  const all = Object.keys(priceSchedulesOffshore[country]).filter(function(p) {
    if (cat === "onshore" && country === "Canada") return !!onshoreRatesCanada[p];
    return true;
  });
  const preferred = country === "Canada"
    ? ["Morning 20","Semi Intensive 26","Intensive 30"]
    : ["Morning 20","Semi Intensive 23","Intensive 27"];
  const picked = preferred.filter(function(p){ return all.indexOf(p) !== -1; });
  return picked.length ? picked : all.slice(0, 3);
}

function calculateComparison() {
  const results = comparisonProgramList().map(function(p) {
    const d = calculateGeneric(p);
    return { name:(ccIndex[p] ? ccIndex[p].label : p), data:d };
  });
  lastCompResults = results;
  lastCompNet  = null;
  lastMode     = 'comparison';
  lastDuration = parseInt(document.getElementById("duration").value) || 1;
  lastCalcData = null;

  const c = results[0].data;
  const rows = activeComparisonRows(results);

  let html = '<div style="border-bottom:1px solid #ddd;padding-bottom:10px;margin-bottom:10px;">';
  quoteHeaderRows(c, { programsCompared: results.map(function(r){ return r.name; }).join(", ") })
    .forEach(function(r){ html += r[0] + ": " + r[1] + "<br>"; });
  html += '</div><strong>Side-by-side comparison</strong><table><tr><th>Fee item</th>';
  results.forEach(function(r){ html += '<th>' + r.name + '</th>'; });
  html += '</tr>';

  rows.forEach(function(row) {
    html += '<tr><td class="row-label">' + row.label + '</td>';
    results.forEach(function(r) {
      const val = r.data[row.key];
      const neg = row.negative && val > 0;
      html += '<td' + (neg ? ' style="color:#c0392b;"' : '') + '>' + compCell(row, val) + '</td>';
    });
    html += '</tr>';
  });

  html += '<tr class="total-row"><td class="row-label">TOTAL</td>';
  results.forEach(function(r){ html += '<td>' + money(r.data.total) + '</td>'; });
  html += '</tr><tr id="comm-comp-row" style="display:none;"><td class="row-label">Commission</td>';
  results.forEach(function(_, i){ html += '<td id="comm-comp-' + i + '">-</td>'; });
  html += '</tr><tr id="net-comp-row" style="display:none;" class="total-row"><td class="row-label">Net to OIEG</td>';
  results.forEach(function(_, i){ html += '<td id="net-comp-' + i + '">-</td>'; });
  html += '</tr><tr id="asp-comp-row" style="display:none;" class="asp-row"><td class="row-label">ASP (per week)</td>';
  results.forEach(function(_, i){ html += '<td id="asp-comp-' + i + '">-</td>'; });
  html += '</tr></table>';

  document.getElementById("total-price").innerHTML = html;
  document.getElementById("total-price").style.display = "block";
  document.getElementById("action-buttons").style.display = "block";
  document.getElementById("agent-section").style.display = "block";
  document.getElementById("agent-result").style.display = "none";
}

/* =========================================================================
   COMMISSION AND ASP
   ========================================================================= */
function computeASP(tuitionAfterDiscount, commissionRate, enrolmentFee, weeks) {
  const commissionAmt = tuitionAfterDiscount * (commissionRate / 100);
  const asp = ((tuitionAfterDiscount - commissionAmt) + enrolmentFee) / weeks;
  return { commissionAmt:commissionAmt, asp:asp };
}

function calculateCommission() {
  const rate = parseFloat(document.getElementById("commission").value) || 0;
  const amt  = lastTuitionAfterDiscount * (rate / 100);
  document.getElementById("agent-result").innerHTML =
    '<strong>Commission:</strong> ' + money(amt) + '<br>' +
    '<strong>Net to OIEG:</strong> ' + money(lastTotal - amt);
  document.getElementById("agent-result").style.display = "block";
}

function calculateNetComparison() {
  const rate = parseFloat(document.getElementById("commission").value) || 0;
  const out  = document.getElementById("agent-result");

  if (lastMode !== 'comparison' || !lastCompResults.length) {
    out.innerHTML = '<strong>Run a comparison first.</strong><br>' +
      '<span style="font-size:11px;color:#999;">Press "Comparison" above, then Net comparison.</span>';
    out.style.display = "block";
    return;
  }

  const values = lastCompResults.map(function(r) {
    const commissionAmt = r.data.tuitionFinal * (rate / 100);
    return { name:r.name, commissionAmt:commissionAmt, net:r.data.total - commissionAmt };
  });
  lastCompNet = { rate:rate, values:values };

  const commRow = document.getElementById("comm-comp-row");
  const netRow  = document.getElementById("net-comp-row");
  if (commRow && netRow) {
    commRow.style.display = "";
    netRow.style.display  = "";
    values.forEach(function(v, i) {
      const cCell = document.getElementById("comm-comp-" + i);
      const nCell = document.getElementById("net-comp-" + i);
      if (cCell) { cCell.textContent = "-" + money(v.commissionAmt); cCell.style.color = "#c0392b"; }
      if (nCell) nCell.textContent = money(v.net);
    });
  }

  const best = values.reduce(function(a, b){ return b.net > a.net ? b : a; });
  out.innerHTML =
    '<strong>Commission and net added to comparison table above</strong><br>' +
    'Commission rate: ' + rate + '% of tuition after discount<br>' +
    'Highest net to OIEG: ' + best.name + ' at ' + money(best.net) + '<br>' +
    '<span style="font-size:11px;color:#999;">Net to OIEG = total - commission</span>';
  out.style.display = "block";
}

function calculateASP() {
  const commRate = parseFloat(document.getElementById("commission").value) || 0;
  const enrolFee = parseFloat(document.getElementById("enrolment-fee").value) || 0;
  const weeks    = lastDuration || 1;

  if (lastMode === 'single') {
    const r = computeASP(lastTuitionAfterDiscount, commRate, enrolFee, weeks);
    const commLine = commRate > 0
      ? 'Commission (' + commRate + '% of tuition): <span class="discount-line">-' + money(r.commissionAmt) + '</span><br>' : '';
    document.getElementById("agent-result").innerHTML =
      commLine +
      'Tuition after commission: ' + money(lastTuitionAfterDiscount - r.commissionAmt) + '<br>' +
      'Enrolment fee: ' + money(enrolFee) + '<br>' +
      'Duration: ' + weeks + ' weeks<br>' +
      '<span class="asp-highlight">ASP: ' + money(r.asp) + ' / week</span><br>' +
      '<span style="font-size:11px;color:#999;">Formula: (tuition - commission + enrolment fee) / weeks</span>';
    document.getElementById("agent-result").style.display = "block";
  } else if (lastMode === 'comparison' && lastCompResults.length) {
    const aspRow = document.getElementById("asp-comp-row");
    if (aspRow) {
      aspRow.style.display = "";
      lastCompResults.forEach(function(r, i) {
        const a = computeASP(r.data.tuitionFinal, commRate, enrolFee, weeks);
        const cell = document.getElementById("asp-comp-" + i);
        if (cell) cell.textContent = money(a.asp) + "/wk";
      });
    }
    document.getElementById("agent-result").innerHTML =
      '<strong>ASP added to comparison table above</strong><br>' +
      'Commission rate: ' + commRate + '% | Enrolment fee: ' + money(enrolFee) + ' | Duration: ' + weeks + ' wks<br>' +
      '<span style="font-size:11px;color:#999;">Formula: (tuition - commission + enrolment fee) / weeks</span>';
    document.getElementById("agent-result").style.display = "block";
  }
}

function downloadPDF() {
  const btn = document.getElementById("dl-btn");
  btn.textContent = "Generating...";
  btn.disabled = true;

  try {
    const jsPDF = window.jspdf.jsPDF;
    const doc   = new jsPDF({ unit:"mm", format:"a4" });

    const colW   = pageW - margin * 2;
    let y = 20;

    const country = document.getElementById("country").value;
    const campus  = document.getElementById("campus").value;

    function hline(yPos, color) {
      color = color || [220,220,220];
      doc.setDrawColor(color[0], color[1], color[2]); doc.setLineWidth(0.3);
      doc.line(margin, yPos, pageW - margin, yPos);
    }
    function checkPage(needed) { if (y + (needed || 10) > 275) { doc.addPage(); y = 20; } }

    if (lastMode === 'single' && lastCalcData) {
      const d = lastCalcData;

      doc.setFillColor(0,119,204); doc.rect(0, 0, pageW, 14, "F");
      doc.setTextColor(255,255,255);
      doc.setFontSize(13); doc.setFont("helvetica","bold");
      doc.text(d.school === "Career Colleges" ? "CAREER COLLEGE QUOTE" : "ENGLISH LANGUAGE QUOTE", margin, 9.5);
      doc.setFontSize(9); doc.setFont("helvetica","normal");
      doc.text(new Date().toLocaleDateString("en-CA",{year:"numeric",month:"long",day:"numeric"}), pageW-margin, 9.5, {align:"right"});
      y = 24;

      doc.setTextColor(50,50,50);
      doc.setFontSize(10); doc.setFont("helvetica","bold");
      doc.text("QUOTE DETAILS", margin, y); y += 6;
      hline(y); y += 5;

      const details = quoteHeaderRows(d);
      doc.setFontSize(9); doc.setFont("helvetica","normal");
      details.forEach(function(row) {
        checkPage(6);
        doc.setTextColor(120,120,120); doc.text(row[0], margin, y);
        doc.setTextColor(40,40,40);    doc.text(String(row[1]), margin + 50, y);
        y += 6;
      });

      y += 4; hline(y); y += 7;
      doc.setFontSize(10); doc.setFont("helvetica","bold"); doc.setTextColor(50,50,50);
      doc.text("FEE BREAKDOWN", margin, y); y += 6;
      hline(y); y += 5;

      doc.setFontSize(9);
      buildFeeRows(d).forEach(function(item, idx) {
        const hasNote   = !!item.note;
        const rowHeight = hasNote ? 9.5 : 6.5;
        checkPage(rowHeight + 2);
        if (idx % 2 === 0) { doc.setFillColor(248,248,248); doc.rect(margin, y-4, colW, rowHeight, "F"); }

        doc.setFont("helvetica","normal"); doc.setTextColor(50,50,50); doc.setFontSize(9);
        doc.text(item.label, margin+2, y);
        doc.setFont("helvetica","bold");
        if (item.negative) doc.setTextColor(192,57,43);
        doc.text((item.negative ? "-" : "") + money(item.value), pageW-margin, y, {align:"right"});
        doc.setTextColor(50,50,50);

        if (hasNote) {
          doc.setFont("helvetica","normal"); doc.setTextColor(150,150,150); doc.setFontSize(7.5);
          doc.text(item.note, margin+2, y+4.5);
          doc.setFontSize(9); doc.setTextColor(50,50,50);
        }
        y += rowHeight;
      });

      checkPage(14);
      y += 2; hline(y, [0,119,204]); y += 5;
      doc.setFillColor(0,119,204); doc.rect(margin, y-4, colW, 10, "F");
      doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(12);
      doc.text("TOTAL", margin+3, y+3);
      doc.text(money(d.total), pageW-margin-3, y+3, {align:"right"});
      y += 14;

    } else if (lastMode === 'comparison' && lastCompResults.length) {
      doc.setFillColor(80,50,180); doc.rect(0, 0, pageW, 14, "F");
      doc.setTextColor(255,255,255);
      doc.setFontSize(13); doc.setFont("helvetica","bold");
      doc.text("PROGRAMME COMPARISON", margin, 9.5);
      doc.setFontSize(9); doc.setFont("helvetica","normal");
      doc.text(new Date().toLocaleDateString("en-CA",{year:"numeric",month:"long",day:"numeric"}), pageW-margin, 9.5, {align:"right"});
      y = 24;

      const c = lastCompResults[0].data;
      doc.setTextColor(50,50,50); doc.setFontSize(10); doc.setFont("helvetica","bold");
      doc.text("QUOTE DETAILS", margin, y); y += 6;
      hline(y); y += 5;

      doc.setFontSize(9); doc.setFont("helvetica","normal");
      quoteHeaderRows(c, { programsCompared: lastCompResults.map(function(r){ return r.name; }).join(", ") })
        .forEach(function(row) {
          checkPage(6);
          doc.setTextColor(120,120,120); doc.text(row[0], margin, y);
          doc.setTextColor(40,40,40);
          doc.text(doc.splitTextToSize(String(row[1]), colW - 52)[0], margin + 50, y);
          y += 6;
        });
      y += 4; hline(y); y += 8;

      const labelW = 52;
      const dataW  = (colW - labelW) / lastCompResults.length;

      doc.setFillColor(0,119,204); doc.rect(margin, y-5, colW, 8, "F");
      doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(8.5);

      lastCompResults.forEach(function(r, i) {

      activeComparisonRows(lastCompResults).forEach(function(row, idx) {
        checkPage(8);
        if (idx % 2 === 0) { doc.setFillColor(248,248,248); doc.rect(margin, y-3, colW, 7, "F"); }
        doc.setFont("helvetica","normal"); doc.setTextColor(60,60,60); doc.setFontSize(8.5);

        lastCompResults.forEach(function(r, i) {

          doc.text(compCell(row, val), margin+labelW+(i+0.5)*dataW, y, {align:"center"});
        });
        y += 7;
      });

      checkPage(10);
      doc.setFillColor(0,119,204); doc.rect(margin, y-3, colW, 8, "F");
      doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(9);
      doc.text("TOTAL", margin+2, y);
      lastCompResults.forEach(function(r, i) {
        doc.text(money(r.data.total), margin+labelW+(i+0.5)*dataW, y, {align:"center"});
      });
      y += 10;

      if (lastCompNet) {
        checkPage(24);
        doc.setFont("helvetica","normal"); doc.setTextColor(60,60,60); doc.setFontSize(8.5);
        doc.setFillColor(248,248,248); doc.rect(margin, y-3, colW, 7, "F");
        doc.text("Commission (" + lastCompNet.rate + "%)", margin+2, y);
        doc.setTextColor(192,57,43); doc.setFont("helvetica","bold");
        lastCompNet.values.forEach(function(v, i) {
          doc.text("-" + money(v.commissionAmt), margin+labelW+(i+0.5)*dataW, y, {align:"center"});
        });
        y += 9;

        checkPage(12);
        doc.setFillColor(83,74,183); doc.rect(margin, y-3, colW, 8, "F");
        doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(9);
        doc.text("NET TO OIEG", margin+2, y);
        lastCompNet.values.forEach(function(v, i) {
          doc.text(money(v.net), margin+labelW+(i+0.5)*dataW, y, {align:"center"});
        });
        y += 10;

        doc.setFontSize(7); doc.setTextColor(140,140,140); doc.setFont("helvetica","normal");
        doc.text("Commission applies to tuition after discount. Net to OIEG = total minus commission.", margin, y);
        y += 6;
      }
    }

    doc.setFontSize(7.5); doc.setTextColor(160,160,160); doc.setFont("helvetica","normal");
    doc.text("Generated by Oxford International North America Calculator", margin, 290);
    doc.text("CONFIDENTIAL", pageW-margin, 290, {align:"right"});

    const isComparisonPDF = lastMode === 'comparison' && lastCompResults.length;
    const prog  = document.getElementById("program-type").value;
    const fname = isComparisonPDF
      ? "OI_Quote_Comparison_" + (campus||"Quote") + "_" + new Date().toISOString().slice(0,10) + ".pdf"
      : "OI_Quote_" + (campus||"Quote") + "_" + prog.replace(/[\s\/]/g,"_") + "_" + new Date().toISOString().slice(0,10) + ".pdf";
    doc.save(fname);

  } catch(e) {
    alert("PDF generation failed: " + e.message);
  }

  btn.innerHTML = "Download PDF";
  btn.disabled  = false;
}

function emailQuote() {
  const email = document.getElementById("email-address").value;
  if (!email) { alert("Enter an email address to send the quote."); return; }
  const content = lastMode === "comparison" ? buildComparisonText() : buildSingleQuoteText();
  window.location.href = "mailto:" + email + "?subject=Oxford International Quote&body=" + encodeURIComponent(content);
}

function centerText(text, width) {
  const pad = Math.max(0, Math.floor((width - text.length) / 2));
  return " ".repeat(pad) + text;
}

function copyRow(label, value, width) {
  const dots = Math.max(2, width - label.length - value.length - 1);
  return label + " " + ".".repeat(dots) + " " + value;
}

function buildSingleQuoteText() {
  const d = lastCalcData || calculateGeneric(document.getElementById("program-type").value);
  const W = 52;
  const bar = "=".repeat(W);
  const rule = "-".repeat(W);

  const lines = [ bar, centerText("QUOTE BREAKDOWN", W), bar ];
  quoteHeaderRows(d).forEach(function(r) {
    lines.push((r[0] + "                 ").slice(0, 17) + ": " + r[1]);
  });
  lines.push(rule);

  buildFeeRows(d).forEach(function(r) {
    lines.push(copyRow(r.label, (r.negative ? "-" : "") + money(r.value), W));
    if (r.note) lines.push("   " + r.note);
  });

  lines.push(rule);
  lines.push(copyRow("TOTAL", money(d.total), W));
  lines.push(bar);
  return lines.join("\n");
}

function buildComparisonText() {
  const campus   = document.getElementById("campus").value;
  const country  = document.getElementById("country").value;
  const duration = document.getElementById("duration").value;
  const results  = lastCompResults;
  const labelW   = 24;
  const colW     = 13;
  const totalW   = labelW + colW * results.length;
  const bar      = "=".repeat(totalW);
  const rule     = "-".repeat(totalW);

  function tRow(label, values) {
    let out = label.length > labelW ? label.slice(0, labelW - 1) + " " : label.padEnd(labelW);
    values.forEach(function(v) { out += v.padStart(colW); });
    return out;
  }

  const c = results[0].data;
  const lines = [ bar, centerText("PROGRAMME COMPARISON", totalW), bar ];
  quoteHeaderRows(c, { programsCompared: results.map(function(r){ return r.name; }).join(", ") })
    .forEach(function(r) {
      lines.push((r[0] + "                 ").slice(0, 17) + ": " + r[1]);
    });
  lines.push(rule);
  lines.push(tRow("Fee item", results.map(function(r){ return r.name; })));
  lines.push(rule);

  activeComparisonRows(results).forEach(function(row) {
    lines.push(tRow(row.label, results.map(function(r) {
      return compCell(row, r.data[row.key]);
    })));
  });

  lines.push(rule);
  lines.push(tRow("TOTAL", results.map(function(r){ return money(r.data.total); })));
  if (lastCompNet) {
    lines.push(rule);
    lines.push(tRow("Commission (" + lastCompNet.rate + "%)",
      lastCompNet.values.map(function(v){ return "-" + money(v.commissionAmt); })));
    lines.push(tRow("Net to OIEG",
      lastCompNet.values.map(function(v){ return money(v.net); })));
  }
  lines.push(bar);
  return lines.join("\n");
}

  return '<table ' + wrap + '><tbody>' + rows + '</tbody></table>';
}

function buildComparisonHTML() {
  const campus   = document.getElementById("campus").value;
  const country  = document.getElementById("country").value;
  const duration = document.getElementById("duration").value;
  const results  = lastCompResults;
  const colCount = results.length + 1;

  const wrap      = 'style="font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#333333;border-collapse:collapse;width:100%;border:1px solid #dddddd;"';
  const titleCell = 'style="background-color:#534AB7;color:#ffffff;padding:10px 8px;font-size:15px;font-weight:bold;text-align:center;"';
  const subHead   = 'style="padding:6px 8px;background-color:#f5f5f5;color:#555555;font-size:11px;"';
  const headCell  = 'style="background-color:#0077cc;color:#ffffff;padding:8px;font-weight:bold;text-align:center;"';
  const labelCell = 'style="padding:7px 8px;text-align:left;font-weight:bold;background-color:#fafafa;"';
  const valCell   = 'style="padding:7px 8px;text-align:center;"';
  const negCell   = 'style="padding:7px 8px;text-align:center;color:#c0392b;font-weight:bold;"';
  const totLblCell = 'style="padding:9px 8px;text-align:left;font-weight:bold;background-color:#eef7ff;"';
  const totValCell = 'style="padding:9px 8px;text-align:center;font-weight:bold;background-color:#eef7ff;color:#0077cc;"';

  let head = '<tr><td ' + headCell + '>Fee item</td>';
  results.forEach(function(r){ head += '<td ' + headCell + '>' + r.name + '</td>'; });
  head += '</tr>';

  let bodyRows = "";
  activeComparisonRows(results).forEach(function(row) {
    bodyRows += '<tr><td ' + labelCell + '>' + row.label + '</td>';
    results.forEach(function(r) {
      const val = r.data[row.key];
      const neg = row.negative && val > 0;
      bodyRows += '<td ' + (neg ? negCell : valCell) + '>' + compCell(row, val) + '</td>';
    });
    bodyRows += '</tr>';
  });

  let totalRow = '<tr><td ' + totLblCell + '>TOTAL</td>';
  results.forEach(function(r){ totalRow += '<td ' + totValCell + '>' + money(r.data.total) + '</td>'; });
  totalRow += '</tr>';

  let netRows = "";
  if (lastCompNet) {
    const netLblCell = 'style="padding:9px 8px;text-align:left;font-weight:bold;background-color:#f3f0ff;color:#534AB7;"';
    const netValCell = 'style="padding:9px 8px;text-align:center;font-weight:bold;background-color:#f3f0ff;color:#534AB7;"';
    netRows += '<tr><td ' + labelCell + '>Commission (' + lastCompNet.rate + '%)</td>';
    lastCompNet.values.forEach(function(v){ netRows += '<td ' + negCell + '>-' + money(v.commissionAmt) + '</td>'; });
    netRows += '</tr><tr><td ' + netLblCell + '>Net to OIEG</td>';
    lastCompNet.values.forEach(function(v){ netRows += '<td ' + netValCell + '>' + money(v.net) + '</td>'; });
    netRows += '</tr>';
  }

  const detailLine = 'style="padding:4px 8px;background-color:#f5f5f5;color:#555555;font-size:11px;"';
  let detailRows = "";
  quoteHeaderRows(results[0].data, { programsCompared: results.map(function(r){ return r.name; }).join(", ") })
    .forEach(function(r) {
      detailRows += '<tr><td colspan="' + colCount + '" ' + detailLine + '><b>' + r[0] + ':</b> ' + r[1] + '</td></tr>';
    });

  return '<table ' + wrap + '><tbody>' +
    '<tr><td colspan="' + colCount + '" ' + titleCell + '>Oxford International Programme Comparison</td></tr>' +
    detailRows +
    '<tr><td colspan="' + colCount + '" ' + subHead + '>&nbsp;</td></tr>' +
    head + bodyRows + totalRow + netRows + '</tbody></table>';
}

async function copyQuote() {
  const isComparison = lastMode === "comparison" && lastCompResults.length;
  const html = isComparison ? buildComparisonHTML() : buildSingleQuoteHTML();
  const text = isComparison ? buildComparisonText() : buildSingleQuoteText();
  const btn  = document.getElementById("copy-btn");

  function showCopied() {
    btn.textContent = "Copied";
    setTimeout(function(){ btn.textContent = "Copy breakdown"; }, 2000);
  }

  try {
    if (window.ClipboardItem) {
      await navigator.clipboard.write([ new ClipboardItem({
        "text/html":  new Blob([html], { type:"text/html" }),
        "text/plain": new Blob([text], { type:"text/plain" })
      })]);
    } else {
      await navigator.clipboard.writeText(text);
    }
    showCopied();
  } catch (e) {
    navigator.clipboard.writeText(text).then(showCopied);
  }
}
